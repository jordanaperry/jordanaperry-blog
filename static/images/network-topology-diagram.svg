<path d="M199 474 L199 628" fill="none" stroke="#BA7517" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)" opacity="0.6"/>
<path d="M234 474 L269 628" fill="none" stroke="#BA7517" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)" opacity="0.6"/>

<!-- nautilus -->
<g class="n-amber">
  <rect x="24" y="628" width="110" height="48" rx="8" stroke-width="0.5"/>
  <text class="th" x="79" y="646" text-anchor="middle" dominant-baseline="central">nautilus</text>
  <text class="ts" x="79" y="663" text-anchor="middle" dominant-baseline="central">fridge · drift 20</text>
