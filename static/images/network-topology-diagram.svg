<path d="M472 384 L520 524" fill="none" stroke="#378ADD" stroke-width="1" marker-end="url(#arrow)" opacity="0.35"/>

<!-- bastion -->
<g class="n-blue">
  <rect x="318" y="524" width="120" height="48" rx="8" stroke-width="0.5"/>
  <text class="th" x="378" y="542" text-anchor="middle" dominant-baseline="central">bastion</text>
  <text class="ts" x="378" y="559" text-anchor="middle" dominant-baseline="central">SSH jump · midnight</text>
