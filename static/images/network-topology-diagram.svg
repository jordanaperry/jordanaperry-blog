<path d="M79 474 L79 524" fill="none" stroke="#1D9E75" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)" opacity="0.6"/>
<g class="n-teal">
  <rect x="24" y="524" width="110" height="48" rx="8" stroke-width="0.5"/>
  <text class="th" x="79" y="542" text-anchor="middle" dominant-baseline="central">manta</text>
  <text class="ts" x="79" y="559" text-anchor="middle" dominant-baseline="central">MacBook · reef 10</text>
</g>

