<svg width="100%" viewBox="0 0 680 720" role="img" xmlns="http://www.w3.org/2000/svg">
<title>VLAN segmentation diagram — ocean theme</title>
<desc>Six VLANs shown as ocean depth zones from surface to abyss, with arrows showing allowed traffic between zones</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; }
    .th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .arr { stroke: #888780; stroke-width: 1.5; fill: none; }

    /* surface / abyss — gray */
    .vlan-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
    .vlan-gray .th { fill: #2C2C2A; }
    .vlan-gray .ts { fill: #5F5E5A; }

    /* reef — teal */
    .vlan-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
    .vlan-teal .th { fill: #085041; }
    .vlan-teal .ts { fill: #0F6E56; }

    /* drift — amber */
    .vlan-amber rect { fill: #FAEEDA; stroke: #BA7517; }
    .vlan-amber .th { fill: #633806; }
    .vlan-amber .ts { fill: #854F0B; }

    /* twilight — purple */
    .vlan-purple rect { fill: #EEEDFE; stroke: #534AB7; }
    .vlan-purple .th { fill: #26215C; }
    .vlan-purple .ts { fill: #534AB7; }

    /* midnight — blue */
    .vlan-blue rect { fill: #E6F1FB; stroke: #185FA5; }
    .vlan-blue .th { fill: #042C53; }
    .vlan-blue .ts { fill: #185FA5; }

    /* internet — gray */
    .vlan-internet ellipse { fill: #F1EFE8; stroke: #5F5E5A; }
    .vlan-internet .th { fill: #2C2C2A; }

    @media (prefers-color-scheme: dark) {
      .th { fill: #D3D1C7; }
      .ts { fill: #888780; }
      .vlan-gray rect { fill: #444441; stroke: #B4B2A9; }
      .vlan-gray .th { fill: #D3D1C7; }
      .vlan-gray .ts { fill: #B4B2A9; }
      .vlan-teal rect { fill: #085041; stroke: #5DCAA5; }
      .vlan-teal .th { fill: #9FE1CB; }
      .vlan-teal .ts { fill: #5DCAA5; }
      .vlan-amber rect { fill: #633806; stroke: #EF9F27; }
      .vlan-amber .th { fill: #FAC775; }
      .vlan-amber .ts { fill: #EF9F27; }
      .vlan-purple rect { fill: #26215C; stroke: #AFA9EC; }
      .vlan-purple .th { fill: #CECBF6; }
      .vlan-purple .ts { fill: #AFA9EC; }
      .vlan-blue rect { fill: #042C53; stroke: #85B7EB; }
      .vlan-blue .th { fill: #B5D4F4; }
      .vlan-blue .ts { fill: #85B7EB; }
      .vlan-internet ellipse { fill: #444441; stroke: #B4B2A9; }
      .vlan-internet .th { fill: #D3D1C7; }
    }
  </style>
</defs>

<!-- VLAN 1 — surface -->
<g class="vlan-gray">
  <rect x="40" y="30" width="600" height="68" rx="10" stroke-width="0.5"/>
  <text class="th" x="160" y="57" text-anchor="middle" dominant-baseline="central">surface — VLAN 1</text>
  <text class="ts" x="160" y="77" text-anchor="middle" dominant-baseline="central">192.168.1.0/24</text>
  <text class="ts" x="520" y="64" text-anchor="middle" dominant-baseline="central">Unifi switch · Unifi AP · management only</text>
</g>

<!-- VLAN 10 — reef -->
<g class="vlan-teal">
  <rect x="40" y="122" width="600" height="68" rx="10" stroke-width="0.5"/>
  <text class="th" x="160" y="149" text-anchor="middle" dominant-baseline="central">reef — VLAN 10</text>
  <text class="ts" x="160" y="169" text-anchor="middle" dominant-baseline="central">192.168.10.0/24</text>
  <text class="ts" x="520" y="156" text-anchor="middle" dominant-baseline="central">MacBook · gaming PC · trusted devices</text>
</g>

<!-- VLAN 20 — drift -->
<g class="vlan-amber">
  <rect x="40" y="214" width="600" height="68" rx="10" stroke-width="0.5"/>
  <text class="th" x="160" y="241" text-anchor="middle" dominant-baseline="central">drift — VLAN 20</text>
  <text class="ts" x="160" y="261" text-anchor="middle" dominant-baseline="central">192.168.20.0/24</text>
  <text class="ts" x="520" y="248" text-anchor="middle" dominant-baseline="central">fridge · microwave · stove · IoT jail</text>
</g>

<!-- VLAN 30 — twilight -->
<g class="vlan-purple">
  <rect x="40" y="306" width="600" height="68" rx="10" stroke-width="0.5"/>
  <text class="th" x="160" y="333" text-anchor="middle" dominant-baseline="central">twilight — VLAN 30</text>
  <text class="ts" x="160" y="353" text-anchor="middle" dominant-baseline="central">192.168.30.0/24</text>
  <text class="ts" x="520" y="340" text-anchor="middle" dominant-baseline="central">public-facing VMs · blog server · DMZ</text>
</g>

<!-- VLAN 40 — midnight -->
<g class="vlan-blue">
  <rect x="40" y="398" width="600" height="68" rx="10" stroke-width="0.5"/>
  <text class="th" x="160" y="425" text-anchor="middle" dominant-baseline="central">midnight — VLAN 40</text>
  <text class="ts" x="160" y="445" text-anchor="middle" dominant-baseline="central">192.168.40.0/24</text>
  <text class="ts" x="520" y="432" text-anchor="middle" dominant-baseline="central">Proxmox · Unifi controller · bastion host</text>
</g>

<!-- VLAN 50 — abyss -->
<g class="vlan-gray">
  <rect x="40" y="490" width="600" height="68" rx="10" stroke-width="0.5"/>
  <text class="th" x="160" y="517" text-anchor="middle" dominant-baseline="central">abyss — VLAN 50</text>
  <text class="ts" x="160" y="537" text-anchor="middle" dominant-baseline="central">192.168.50.0/24</text>
  <text class="ts" x="520" y="524" text-anchor="middle" dominant-baseline="central">Synology NAS · static leases only</text>
</g>

<!-- Internet -->
<g class="vlan-internet">
  <ellipse cx="340" cy="636" rx="80" ry="30"/>
  <text class="th" x="340" y="636" text-anchor="middle" dominant-baseline="central">internet</text>
</g>

<!-- Allowed internal arrows — left side -->
<!-- reef → midnight -->
<path d="M130 190 Q90 310 130 398" fill="none" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.8"/>
<!-- reef → abyss -->
<path d="M108 190 Q60 350 108 490" fill="none" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.6"/>
<!-- midnight → abyss -->
<line x1="130" y1="466" x2="130" y2="490" fill="none" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.8"/>

<!-- Internet access — right side dashed lines -->
<line x1="530" y1="190" x2="530" y2="606" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" opacity="0.5" stroke-dasharray="4 3"/>
<line x1="555" y1="282" x2="555" y2="606" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" opacity="0.5" stroke-dasharray="4 3"/>
<line x1="580" y1="374" x2="580" y2="606" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" opacity="0.5" stroke-dasharray="4 3"/>
<line x1="605" y1="466" x2="605" y2="606" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" opacity="0.5" stroke-dasharray="4 3"/>

<text class="ts" x="340" y="648" text-anchor="middle" dominant-baseline="central">internet access</text>

<!-- Legend -->
<line x1="44" y1="584" x2="68" y2="584" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="74" y="588">allowed internal access</text>
<line x1="230" y1="584" x2="254" y2="584" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="260" y="588">internet only</text>
<text class="ts" x="390" y="588">no arrows = fully blocked</text>

</svg>
