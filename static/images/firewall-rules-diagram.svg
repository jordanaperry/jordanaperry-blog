<line x1="440" y1="1122" x2="458" y2="1122" stroke="#A32D2D" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
<g class="block"><rect x="460" y="1100" width="170" height="44" rx="6"/>
<text class="th" x="545" y="1122" text-anchor="middle" dominant-baseline="central">block</text></g>

</svg>
