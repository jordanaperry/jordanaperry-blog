<svg width="100%" viewBox="0 0 680 1164" role="img" xmlns="http://www.w3.org/2000/svg">
<title>pfSense firewall rules flow — all VLANs</title>
<desc>Firewall rules for each VLAN evaluated top to bottom. Each row shows a rule and its pass or block outcome. Sections: reef trusted, drift IoT, twilight DMZ, midnight internal servers, abyss NAS.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; }
    .th  { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .ts  { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .rule rect  { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
    .rule .th   { fill: #2C2C2A; }
    .rule .ts   { fill: #5F5E5A; }
    .pass rect  { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
    .pass .th   { fill: #085041; }
    .block rect { fill: #FCEBEB; stroke: #A32D2D; stroke-width: 0.5; }
    .block .th  { fill: #501313; }
    .pill-teal   { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
    .pill-teal-t { fill: #085041; font-size: 12px; font-weight: 500; }
    .pill-amber  { fill: #FAEEDA; stroke: #BA7517; stroke-width: 0.5; }
    .pill-amber-t{ fill: #633806; font-size: 12px; font-weight: 500; }
    .pill-purple { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
    .pill-purple-t{ fill: #26215C; font-size: 12px; font-weight: 500; }
    .pill-blue   { fill: #E6F1FB; stroke: #185FA5; stroke-width: 0.5; }
    .pill-blue-t { fill: #042C53; font-size: 12px; font-weight: 500; }
    .pill-gray2  { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
    .pill-gray2-t{ fill: #2C2C2A; font-size: 12px; font-weight: 500; }
    .connector   { fill: none; }
    @media (prefers-color-scheme: dark) {
      .th  { fill: #D3D1C7; }
      .ts  { fill: #888780; }
      .rule rect  { fill: #444441; stroke: #B4B2A9; }
      .rule .th   { fill: #D3D1C7; }
      .rule .ts   { fill: #B4B2A9; }
      .pass rect  { fill: #085041; stroke: #5DCAA5; }
      .pass .th   { fill: #9FE1CB; }
      .block rect { fill: #501313; stroke: #F09595; }
      .block .th  { fill: #F7C1C1; }
      .pill-teal   { fill: #085041; stroke: #5DCAA5; }
      .pill-teal-t { fill: #9FE1CB; }
      .pill-amber  { fill: #633806; stroke: #EF9F27; }
      .pill-amber-t{ fill: #FAC775; }
      .pill-purple { fill: #26215C; stroke: #AFA9EC; }
      .pill-purple-t{ fill: #CECBF6; }
      .pill-blue   { fill: #042C53; stroke: #85B7EB; }
      .pill-blue-t { fill: #B5D4F4; }
      .pill-gray2  { fill: #444441; stroke: #B4B2A9; }
      .pill-gray2-t{ fill: #D3D1C7; }
    }
  </style>
</defs>

<text class="ts" x="310" y="16" text-anchor="middle">rule — evaluated top to bottom, first match wins</text>
<text class="ts" x="570" y="16" text-anchor="middle">outcome</text>

<!-- REEF -->
<rect class="pill-teal" x="40" y="26" width="96" height="22" rx="11"/>
<text class="pill-teal-t" x="88" y="37" text-anchor="middle" dominant-baseline="central">reef — 10</text>
<text class="ts" x="146" y="37" dominant-baseline="central">trusted devices</text>

<line x1="88" y1="48" x2="88" y2="60" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)" opacity="0.5"/>
<g class="rule"><rect x="130" y="60" width="310" height="44" rx="6"/>
<text class="th" x="285" y="76" text-anchor="middle" dominant-baseline="central">DNS to gateway — port 53</text>
<text class="ts" x="285" y="94" text-anchor="middle" dominant-baseline="central">reef net → 192.168.10.1</text></g>
<line x1="440" y1="82" x2="458" y2="82" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
<g class="pass"><rect x="460" y="60" width="170" height="44" rx="6"/>
<text class="th" x="545" y="82" text-anchor="middle" dominant-baseline="central">pass</text></g>

<line x1="285" y1="104" x2="285" y2="116" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" opacity="0.4" class="connector"/>
<g class="rule"><rect x="130" y="116" width="310" height="44" rx="6"/>
<text class="th" x="285" y="132" text-anchor="middle" dominant-baseline="central">reef → NAS (192.168.50.10)</text>
<text class="ts" x="285" y="150" text-anchor="middle" dominant-baseline="central">any port</text></g>
<line x1="440" y1="138" x2="458" y2="138" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
<g class="pass"><rect x="460" y="116" width="170" height="44" rx="6"/>
<text class="th" x="545" y="138" text-anchor="middle" dominant-baseline="central">pass</text></g>

<line x1="285" y1="160" x2="285" y2="172" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" opacity="0.4" class="connector"/>
<g class="rule"><rect x="130" y="172" width="310" height="44" rx="6"/>
<text class="th" x="285" y="188" text-anchor="middle" dominant-baseline="central">reef → midnight (192.168.40.0/24)</text>
<text class="ts" x="285" y="206" text-anchor="middle" dominant-baseline="central">any port</text></g>
<line x1="440" y1="194" x2="458" y2="194" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
<g class="pass"><rect x="460" y="172" width="170" height="44" rx="6"/>
<text class="th" x="545" y="194" text-anchor="middle" dominant-baseline="central">pass</text></g>

<line x1="285" y1="216" x2="285" y2="228" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" opacity="0.4" class="connector"/>
<g class="rule"><rect x="130" y="228" width="310" height="44" rx="6"/>
<text class="th" x="285" y="244" text-anchor="middle" dominant-baseline="central">reef → RFC1918 (all private)</text>
<text class="ts" x="285" y="262" text-anchor="middle" dominant-baseline="central">blocks IoT, DMZ, other VLANs</text></g>
<line x1="440" y1="250" x2="458" y2="250" stroke="#A32D2D" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
<g class="block"><rect x="460" y="228" width="170" height="44" rx="6"/>
<text class="th" x="545" y="250" text-anchor="middle" dominant-baseline="central">block</text></g>

<line x1="285" y1="272" x2="285" y2="284" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" opacity="0.4" class="connector"/>
<g class="rule"><rect x="130" y="284" width="310" height="44" rx="6"/>
<text class="th" x="285" y="300" text-anchor="middle" dominant-baseline="central">reef → any</text>
<text class="ts" x="285" y="318" text-anchor="middle" dominant-baseline="central">internet access</text></g>
<line x1="440" y1="306" x2="458" y2="306" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
<g class="pass"><rect x="460" y="284" width="170" height="44" rx="6"/>
<text class="th" x="545" y="306" text-anchor="middle" dominant-baseline="central">pass</text></g>

<!-- DRIFT -->
<rect class="pill-amber" x="40" y="356" width="96" height="22" rx="11"/>
<text class="pill-amber-t" x="88" y="367" text-anchor="middle" dominant-baseline="central">drift — 20</text>
<text class="ts" x="146" y="367" dominant-baseline="central">IoT jail</text>

<line x1="88" y1="378" x2="88" y2="390" stroke="#BA7517" stroke-width="1" marker-end="url(#arrow)" opacity="0.5"/>
<g class="rule"><rect x="130" y="390" width="310" height="44" rx="6"/>
<text class="th" x="285" y="406" text-anchor="middle" dominant-baseline="central">DNS to gateway — port 53</text>
<text class="ts" x="285" y="424" text-anchor="middle" dominant-baseline="central">drift net → 192.168.20.1</text></g>
<line x1="440" y1="412" x2="458" y2="412" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
<g class="pass"><rect x="460" y="390" width="170" height="44" rx="6"/>
<text class="th" x="545" y="412" text-anchor="middle" dominant-baseline="central">pass</text></g>

<line x1="285" y1="434" x2="285" y2="446" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" opacity="0.4" class="connector"/>
<g class="rule"><rect x="130" y="446" width="310" height="44" rx="6"/>
<text class="th" x="285" y="462" text-anchor="middle" dominant-baseline="central">drift → RFC1918 (all private)</text>
<text class="ts" x="285" y="480" text-anchor="middle" dominant-baseline="central">no internal network access</text></g>
<line x1="440" y1="468" x2="458" y2="468" stroke="#A32D2D" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
<g class="block"><rect x="460" y="446" width="170" height="44" rx="6"/>
<text class="th" x="545" y="468" text-anchor="middle" dominant-baseline="central">block</text></g>

<line x1="285" y1="490" x2="285" y2="502" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" opacity="0.4" class="connector"/>
<g class="rule"><rect x="130" y="502" width="310" height="44" rx="6"/>
<text class="th" x="285" y="518" text-anchor="middle" dominant-baseline="central">drift → any</text>
<text class="ts" x="285" y="536" text-anchor="middle" dominant-baseline="central">internet only</text></g>
<line x1="440" y1="524" x2="458" y2="524" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
<g class="pass"><rect x="460" y="502" width="170" height="44" rx="6"/>
<text class="th" x="545" y="524" text-anchor="middle" dominant-baseline="central">pass</text></g>

<!-- TWILIGHT -->
<rect class="pill-purple" x="40" y="574" width="110" height="22" rx="11"/>
<text class="pill-purple-t" x="95" y="585" text-anchor="middle" dominant-baseline="central">twilight — 30</text>
<text class="ts" x="160" y="585" dominant-baseline="central">DMZ</text>

<line x1="95" y1="596" x2="95" y2="608" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)" opacity="0.5"/>
<g class="rule"><rect x="130" y="608" width="310" height="44" rx="6"/>
<text class="th" x="285" y="624" text-anchor="middle" dominant-baseline="central">twilight → RFC1918 (all private)</text>
<text class="ts" x="285" y="642" text-anchor="middle" dominant-baseline="central">no internal access</text></g>
<line x1="440" y1="630" x2="458" y2="630" stroke="#A32D2D" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
<g class="block"><rect x="460" y="608" width="170" height="44" rx="6"/>
<text class="th" x="545" y="630" text-anchor="middle" dominant-baseline="central">block</text></g>

<line x1="285" y1="652" x2="285" y2="664" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" opacity="0.4" class="connector"/>
<g class="rule"><rect x="130" y="664" width="310" height="44" rx="6"/>
<text class="th" x="285" y="680" text-anchor="middle" dominant-baseline="central">twilight → any</text>
<text class="ts" x="285" y="698" text-anchor="middle" dominant-baseline="central">internet only</text></g>
<line x1="440" y1="686" x2="458" y2="686" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
<g class="pass"><rect x="460" y="664" width="170" height="44" rx="6"/>
<text class="th" x="545" y="686" text-anchor="middle" dominant-baseline="central">pass</text></g>

<!-- MIDNIGHT -->
<rect class="pill-blue" x="40" y="736" width="112" height="22" rx="11"/>
<text class="pill-blue-t" x="96" y="747" text-anchor="middle" dominant-baseline="central">midnight — 40</text>
<text class="ts" x="162" y="747" dominant-baseline="central">internal servers</text>

<line x1="96" y1="758" x2="96" y2="770" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)" opacity="0.5"/>
<g class="rule"><rect x="130" y="770" width="310" height="44" rx="6"/>
<text class="th" x="285" y="786" text-anchor="middle" dominant-baseline="central">DNS to gateway — port 53</text>
<text class="ts" x="285" y="804" text-anchor="middle" dominant-baseline="central">midnight net → 192.168.40.1</text></g>
<line x1="440" y1="792" x2="458" y2="792" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
<g class="pass"><rect x="460" y="770" width="170" height="44" rx="6"/>
<text class="th" x="545" y="792" text-anchor="middle" dominant-baseline="central">pass</text></g>

<line x1="285" y1="814" x2="285" y2="826" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" opacity="0.4" class="connector"/>
<g class="rule"><rect x="130" y="826" width="310" height="44" rx="6"/>
<text class="th" x="285" y="842" text-anchor="middle" dominant-baseline="central">midnight → NAS (192.168.50.10)</text>
<text class="ts" x="285" y="860" text-anchor="middle" dominant-baseline="central">storage access</text></g>
<line x1="440" y1="848" x2="458" y2="848" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
<g class="pass"><rect x="460" y="826" width="170" height="44" rx="6"/>
<text class="th" x="545" y="848" text-anchor="middle" dominant-baseline="central">pass</text></g>

<line x1="285" y1="870" x2="285" y2="882" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" opacity="0.4" class="connector"/>
<g class="rule"><rect x="130" y="882" width="310" height="44" rx="6"/>
<text class="th" x="285" y="898" text-anchor="middle" dominant-baseline="central">midnight → RFC1918 (all private)</text>
<text class="ts" x="285" y="916" text-anchor="middle" dominant-baseline="central">blocks reef, drift, DMZ</text></g>
<line x1="440" y1="904" x2="458" y2="904" stroke="#A32D2D" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
<g class="block"><rect x="460" y="882" width="170" height="44" rx="6"/>
<text class="th" x="545" y="904" text-anchor="middle" dominant-baseline="central">block</text></g>

<line x1="285" y1="926" x2="285" y2="938" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" opacity="0.4" class="connector"/>
<g class="rule"><rect x="130" y="938" width="310" height="44" rx="6"/>
<text class="th" x="285" y="954" text-anchor="middle" dominant-baseline="central">midnight → any</text>
<text class="ts" x="285" y="972" text-anchor="middle" dominant-baseline="central">internet for updates</text></g>
<line x1="440" y1="960" x2="458" y2="960" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
<g class="pass"><rect x="460" y="938" width="170" height="44" rx="6"/>
<text class="th" x="545" y="960" text-anchor="middle" dominant-baseline="central">pass</text></g>

<!-- ABYSS -->
<rect class="pill-gray2" x="40" y="1010" width="88" height="22" rx="11"/>
<text class="pill-gray2-t" x="84" y="1021" text-anchor="middle" dominant-baseline="central">abyss — 50</text>
<text class="ts" x="138" y="1021" dominant-baseline="central">NAS</text>

<line x1="84" y1="1032" x2="84" y2="1044" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" opacity="0.5"/>
<g class="rule"><rect x="130" y="1044" width="310" height="44" rx="6"/>
<text class="th" x="285" y="1060" text-anchor="middle" dominant-baseline="central">reef or midnight → abyss</text>
<text class="ts" x="285" y="1078" text-anchor="middle" dominant-baseline="central">trusted sources only</text></g>
<line x1="440" y1="1066" x2="458" y2="1066" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
<g class="pass"><rect x="460" y="1044" width="170" height="44" rx="6"/>
<text class="th" x="545" y="1066" text-anchor="middle" dominant-baseline="central">pass</text></g>

<line x1="285" y1="1088" x2="285" y2="1100" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" opacity="0.4" class="connector"/>
<g class="rule"><rect x="130" y="1100" width="310" height="44" rx="6"/>
<text class="th" x="285" y="1116" text-anchor="middle" dominant-baseline="central">any → abyss (everything else)</text>
